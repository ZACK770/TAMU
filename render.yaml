services:
  # Single Service Deployment (Backend + Frontend)
  - type: web
    name: tamu-learning-system
    env: node
    buildCommand: npm run build && npm run db:push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: YEMOT_API_USERNAME
        sync: false
      - key: YEMOT_API_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
